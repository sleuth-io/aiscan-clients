<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font: 13px system-ui, -apple-system, sans-serif; width: 380px; margin: 0; padding: 12px; }
    h1 { font-size: 14px; margin: 0 0 8px; }
    button { font-size: 13px; padding: 6px 12px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: default; }
    #log { margin-top: 10px; white-space: pre-wrap; background: #f4f4f5; border: 1px solid #ddd;
           border-radius: 6px; padding: 8px; height: 240px; overflow: auto;
           font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; }
    .hint { color: #666; margin: 6px 0 0; }
    code { background: #ececef; padding: 1px 4px; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>aiscan · claude.ai spike</h1>
  <button id="scan">Scan all my claude.ai conversations</button>
  <p class="hint">Needs the local daemon running: <code>aiscan serve --local</code></p>
  <div id="log"></div>
  <script src="popup.js"></script>
</body>
</html>
