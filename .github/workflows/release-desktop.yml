name: Release desktop

# On a desktop-vX.Y.Z tag: test, build, and publish a GitHub Release. Assets:
#
#   - aiscan_<Os>_<arch>.tar.gz / .zip — CLI binaries, named the way
#     go-selfupdate matches (amd64 → x86_64) so installed clients self-update
#     from them. darwin builds happen on a macOS runner because the system
#     tray needs Cgo/Cocoa there; the same tray-enabled binary ships in the
#     tarball and the app bundle, so a binary swap never loses the tray.
#   - Aiscan.dmg — the macOS app bundle (arm64), Developer ID signed +
#     notarized + stapled (ad-hoc when the Apple secrets are absent), with an
#     /Applications symlink. Deliberately named without <os>_<arch> tokens so
#     go-selfupdate never picks it over the tarball. The darwin CLI binaries in
#     the tarballs are signed with the same identity so a self-update swap into
#     the bundle preserves code identity.
#   - checksums.txt — sha256 manifest over all of the above; clients verify
#     downloads against it.
#
# Hand-rolled rather than GoReleaser because prefixed tags in a multi-client
# repo are a GoReleaser Pro feature. Never marked GitHub's repo-level "latest" —
# client releases share this repo, so that single pointer is meaningless and
# extension update URLs must not depend on it.
#
# Per-train "latest" instead lives in a `desktop-latest` pointer release whose
# body names the versioned tag it points at; pulse's download endpoint reads
# only that. After publishing, this workflow moves the pointer to the new
# release unless the tag is annotated "latest: false" (a back-port or a yank —
# see scripts/release.sh).

on:
  push:
    tags: ['desktop-v*']
  # Manual smoke test of the signing/notarization pipeline. Builds, signs, and
  # notarizes exactly like a real release, but the `release` job is skipped
  # (see its `if:`), so nothing is published — the signed dmg/tarballs are only
  # attached as run artifacts. Use this to validate the Apple secrets end-to-end
  # without burning a version tag.
  workflow_dispatch:
    inputs:
      version:
        description: Version label to stamp into the dev build
        default: 0.0.0-dev
        required: false

permissions:
  contents: write # create the Release

jobs:
  gate:
    name: Skip if already released
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.gate.outputs.exists }}
    steps:
      - uses: actions/checkout@v7
      - id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$GITHUB_REF_NAME already released — nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Test
    needs: gate
    if: needs.gate.outputs.exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: desktop/go.mod
      - name: Vet
        working-directory: desktop
        run: go vet ./...
      - name: Test
        working-directory: desktop
        run: go test ./...

  build-linux-windows:
    name: Build linux + windows
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: desktop/go.mod

      - name: Build
        env:
          CGO_ENABLED: 0 # the tray is pure Go off macOS
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          if [ -n "${{ inputs.version }}" ]; then VERSION="${{ inputs.version }}"; fi  # workflow_dispatch override
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%d)"
          BI="github.com/sleuth-io/aiscan-clients/desktop/internal/buildinfo"
          LDFLAGS="-s -w -X ${BI}.Version=${VERSION} -X ${BI}.Commit=${COMMIT} -X ${BI}.Date=${DATE}"

          mkdir -p dist
          for target in linux/amd64 linux/arm64 windows/amd64; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            # go-selfupdate matches assets case-insensitively on <os>_<arch>
            # suffixes; x86_64 is its alias for amd64.
            case "$GOARCH" in
              amd64) ARCH_LABEL=x86_64 ;;
              *)     ARCH_LABEL="$GOARCH" ;;
            esac
            OS_LABEL="$(tr '[:lower:]' '[:upper:]' <<< "${GOOS:0:1}")${GOOS:1}"

            BIN=aiscan
            [ "$GOOS" = "windows" ] && BIN=aiscan.exe
            outdir="dist/build/${GOOS}_${GOARCH}"
            mkdir -p "$outdir"
            (cd desktop && GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -trimpath -ldflags "$LDFLAGS" -o "../${outdir}/${BIN}" ./cmd/aiscan)

            archive="aiscan_${OS_LABEL}_${ARCH_LABEL}"
            if [ "$GOOS" = "windows" ]; then
              (cd "$outdir" && zip -q "../../${archive}.zip" "$BIN")
            else
              tar -czf "dist/${archive}.tar.gz" -C "$outdir" "$BIN"
            fi
          done
          rm -rf dist/build
          ls -l dist

      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux-windows
          path: dist/*
          if-no-files-found: error

  build-darwin:
    name: Build macOS
    needs: test
    runs-on: macos-14
    # Cap the 10x-billed macOS runner. Normal runs finish in minutes; this rides
    # out one genuinely slow notarization (each submit is bounded to 2h) while
    # staying well under GitHub's hard 6h job limit.
    timeout-minutes: 150
    # Developer ID signing + notarization when the Apple secrets are set;
    # otherwise fall back to an ad-hoc build so the release still succeeds
    # (e.g. from a fork without the secrets). See desktop/packaging/macos.
    env:
      SIGN: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12 != '' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: desktop/go.mod

      - name: Import Developer ID certificate
        if: env.SIGN == 'true'
        env:
          CERT_P12: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/aiscan-signing.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          printf '%s' "$CERT_P12" | openssl base64 -d -A > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          # Let codesign use the key non-interactively.
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # Prepend our keychain to the search list so codesign resolves the identity.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          rm -f "$RUNNER_TEMP/cert.p12"
          # Derive the signing identity from the imported cert (its CN is exactly
          # "Developer ID Application: <name> (<team>)") so we need no extra secret.
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" | awk -F'"' '/Developer ID Application/ {print $2; exit}')"
          if [ -z "$IDENTITY" ]; then echo "::error::no Developer ID Application identity in the imported cert"; exit 1; fi
          echo "MACOS_SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Write notary API key
        if: env.SIGN == 'true'
        env:
          NOTARY_KEY_P8: ${{ secrets.APPLE_NOTARY_KEY_P8 }}
        # The secret holds the raw .p8 PEM text (not base64), so write it verbatim.
        run: printf '%s\n' "$NOTARY_KEY_P8" > "$RUNNER_TEMP/notary_key.p8"

      - name: Build binaries, app bundle, dmg
        env:
          CGO_ENABLED: 1 # the tray needs Cocoa on macOS
          # MACOS_SIGN_IDENTITY is exported into GITHUB_ENV by the import step.
          MACOS_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          if [ -n "${{ inputs.version }}" ]; then VERSION="${{ inputs.version }}"; fi  # workflow_dispatch override
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%d)"
          BI="github.com/sleuth-io/aiscan-clients/desktop/internal/buildinfo"
          LDFLAGS="-s -w -X ${BI}.Version=${VERSION} -X ${BI}.Commit=${COMMIT} -X ${BI}.Date=${DATE}"

          ENTITLEMENTS="$PWD/desktop/packaging/macos/entitlements.plist"
          if [ "${SIGN:-}" = "true" ]; then
            # make-dmg.sh reads these to sign + notarize the app and dmg.
            export MACOS_ENTITLEMENTS="$ENTITLEMENTS"
            export MACOS_NOTARY_KEY="$RUNNER_TEMP/notary_key.p8"
          else
            # No secrets: ad-hoc build — clear the identity so make-dmg.sh falls back.
            unset MACOS_SIGN_IDENTITY
          fi

          mkdir -p dist
          for GOARCH in arm64 amd64; do
            case "$GOARCH" in
              amd64) ARCH_LABEL=x86_64 ;;
              *)     ARCH_LABEL="$GOARCH" ;;
            esac
            outdir="dist/build/darwin_${GOARCH}"
            mkdir -p "$outdir"
            (cd desktop && GOARCH="$GOARCH" \
              go build -trimpath -ldflags "$LDFLAGS" -o "../${outdir}/aiscan" ./cmd/aiscan)

            # Sign the standalone binary with the SAME identity + entitlements as
            # the bundled one, so a self-update binary swap preserves code identity.
            if [ "${SIGN:-}" = "true" ]; then
              codesign --force --options runtime --timestamp \
                --entitlements "$ENTITLEMENTS" \
                --sign "$MACOS_SIGN_IDENTITY" "${outdir}/aiscan"
            fi
            tar -czf "dist/aiscan_Darwin_${ARCH_LABEL}.tar.gz" -C "$outdir" aiscan
          done

          # Notarize the standalone CLI binaries. A bare Mach-O can't be stapled,
          # but this registers their tickets so a browser download passes the
          # online Gatekeeper check.
          if [ "${SIGN:-}" = "true" ]; then
            ditto -c -k dist/build "$RUNNER_TEMP/cli-binaries.zip"
            xcrun notarytool submit "$RUNNER_TEMP/cli-binaries.zip" \
              --key "$MACOS_NOTARY_KEY" --key-id "$MACOS_NOTARY_KEY_ID" \
              --issuer "$MACOS_NOTARY_ISSUER" --wait --timeout 2h
          fi

          # The .app ships the same arm64 binary the tarball carries, so a
          # go-selfupdate binary swap inside the bundle changes nothing else.
          # make-dmg.sh signs/notarizes/staples the app + dmg when the env is set.
          desktop/packaging/macos/make-dmg.sh dist/build/darwin_arm64/aiscan "$VERSION" dist
          rm -rf dist/build
          ls -l dist

      - uses: actions/upload-artifact@v4
        with:
          name: dist-darwin
          path: dist/*
          if-no-files-found: error

      - name: Clean up signing material
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/aiscan-signing.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/notary_key.p8" "$RUNNER_TEMP/cert.p12" \
                "$RUNNER_TEMP/cli-binaries.zip" 2>/dev/null || true

  release:
    name: Create release
    needs: [build-linux-windows, build-darwin]
    # Never publish from a manual dispatch — that path only tests the
    # build/sign/notarize pipeline. Real releases come from desktop-v* tags.
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      # Checked out so the pointer step can read the tag's annotation (git cat-file).
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          (cd dist && sha256sum aiscan_*.tar.gz aiscan_*.zip Aiscan.dmg > checksums.txt)
          ls -l dist
          gh release create "$GITHUB_REF_NAME" \
            dist/aiscan_*.tar.gz dist/aiscan_*.zip dist/Aiscan.dmg dist/checksums.txt \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --latest=false \
            --notes "aiscan desktop ${VERSION}. Mac app: download Aiscan.dmg and drag Aiscan to Applications. CLI: installed clients pick this up automatically, or run \`aiscan update\`."

      # Move the desktop-latest pointer to this release, unless the tag says not-latest (a back-port
      # or a yank). The pointer is a release under the fixed `desktop-latest` tag whose body names
      # the versioned tag; pulse's download endpoint reads only that, so it never scans releases.
      # Done here, after assets are uploaded, so the pointer never names a release whose files aren't
      # up yet. A lightweight tag (no annotation) reads as latest.
      - name: Move desktop-latest pointer
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if git cat-file tag "$GITHUB_REF_NAME" 2>/dev/null | grep -qiE '^latest:[[:space:]]*false'; then
            echo "::notice::$GITHUB_REF_NAME is marked not-latest - leaving desktop-latest unchanged."
            exit 0
          fi
          if gh release view desktop-latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit desktop-latest --repo "$GITHUB_REPOSITORY" --notes "$GITHUB_REF_NAME"
          else
            gh release create desktop-latest --repo "$GITHUB_REPOSITORY" \
              --title "desktop latest (pointer)" --notes "$GITHUB_REF_NAME" \
              --prerelease --latest=false
          fi
          echo "::notice::desktop-latest -> $GITHUB_REF_NAME"
