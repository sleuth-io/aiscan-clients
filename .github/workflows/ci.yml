name: CI

on:
  push:
    branches: [main, claude-ai-capture-spike]
  pull_request:

jobs:
  desktop:
    name: Desktop (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: desktop/go.mod

      - name: Format check
        run: make fmtcheck

      - name: Lint
        run: make lint

      - name: Test
        run: make test-desktop

      - name: Build
        run: make build

  extension:
    name: Extension (JS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install deps
        run: npm ci --prefix extension

      - name: Test
        run: make test-extension

      - name: Lint + build (both targets)
        run: make lint-extension

      - name: Verify production build + CRX pack
        working-directory: extension
        env:
          AISCAN_BUILD_ENV: prod
          CHROME_EXT_KEY: ${{ runner.temp }}/ci-key.pem
        run: |
          npm run build:firefox
          npm run keygen:chrome
          npm run pack:chrome
