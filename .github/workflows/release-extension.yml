name: Release extension

# On merge to main: if extension/manifest.json carries a version we haven't released yet, build +
# sign both browsers, publish a GitHub Release with the binaries, and deploy the stable pointer
# files (Chrome update_manifest.xml + Firefox updates.json) to GitHub Pages. Bump the manifest
# version in a PR to ship; no bump = no-op.

on:
  push:
    branches: [main]
    paths: ['extension/**']

permissions:
  contents: write # create the Release
  pages: write # deploy Pages
  id-token: write # Pages OIDC

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  release:
    name: Build, release, deploy Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Read manifest version
        id: ver
        run: echo "version=$(node -p "require('./extension/manifest.json').version")" >> "$GITHUB_OUTPUT"

      - name: Skip if already released
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::v${{ steps.ver.outputs.version }} already released — nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install deps
        if: steps.gate.outputs.exists == 'false'
        run: npm ci --prefix extension

      - name: Write Chrome signing key
        if: steps.gate.outputs.exists == 'false'
        env:
          CHROME_SIGNING_KEY: ${{ secrets.CHROME_SIGNING_KEY }}
        run: |
          if ! printf '%s' "$CHROME_SIGNING_KEY" | base64 -d > extension/chrome-key.pem 2>/dev/null; then
            echo "::error::CHROME_SIGNING_KEY is not valid base64. Re-set it with: base64 -w0 chrome-key.pem | gh secret set CHROME_SIGNING_KEY"
            exit 1
          fi
          if ! grep -q "BEGIN PRIVATE KEY" extension/chrome-key.pem; then
            echo "::error::CHROME_SIGNING_KEY decoded but is not a PEM private key."
            exit 1
          fi

      - name: Package Firefox (signed XPI + updates.json)
        if: steps.gate.outputs.exists == 'false'
        working-directory: extension
        env:
          AISCAN_BUILD_ENV: prod
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: npm run package:firefox

      - name: Package Chrome (CRX + update_manifest.xml)
        if: steps.gate.outputs.exists == 'false'
        working-directory: extension
        env:
          AISCAN_BUILD_ENV: prod
          # Optional guard: if set, the pack fails when the signing key yields a different extension
          # id (a wrong CHROME_SIGNING_KEY would silently break auto-update for managed browsers).
          AISCAN_EXPECTED_APP_ID: ${{ vars.CHROME_EXTENSION_ID }}
        run: npm run pack:chrome

      - name: Create GitHub Release
        if: steps.gate.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          make_latest: true
          files: |
            extension/dist/artifacts/aiscan.crx
            extension/dist/artifacts/aiscan.xpi

      - name: Assemble Pages site
        if: steps.gate.outputs.exists == 'false'
        run: |
          mkdir -p _site
          cp extension/pages/index.html _site/
          cp extension/dist/artifacts/update_manifest.xml _site/
          cp extension/dist/artifacts/updates.json _site/

      - name: Upload Pages artifact
        if: steps.gate.outputs.exists == 'false'
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to Pages
        id: deploy
        if: steps.gate.outputs.exists == 'false'
        uses: actions/deploy-pages@v5
