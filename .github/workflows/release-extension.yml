name: Release extension

# On an extension-vX.Y.Z tag: build + sign both browsers, publish a GitHub Release with the
# binaries, and deploy the stable pointer files (Chrome update_manifest.xml + Firefox updates.json)
# to GitHub Pages. Tag to ship; there is nothing to bump first.
#
# The tag is the source of truth for the version, exactly as it is for the desktop CLI (which
# stamps it via ldflags). extension/manifest.json carries a 0.0.0 placeholder and the build stamps
# the tag's version into the STAGED manifest — the one browsers read for auto-update — so the
# shipped version and the tag cannot disagree. Both stores reject a re-upload of an existing
# version, so each tag must be a new one.
#
# Every client in this repo prefixes its tags (the desktop CLI uses desktop-v*), so nothing owns
# bare vX.Y.Z. The pointer files pin the exact release download URL rather than releases/latest,
# which is meaningless in a multi-client repo, and the release is never marked "latest" for the
# same reason.

on:
  push:
    tags: ['extension-v*']

permissions:
  contents: write # create the Release
  pages: write # deploy Pages
  id-token: write # Pages OIDC

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  release:
    name: Build, release, deploy Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#extension-v}" >> "$GITHUB_OUTPUT"

      - name: Skip if already released
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$GITHUB_REF_NAME already released — nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install deps
        if: steps.gate.outputs.exists == 'false'
        run: npm ci --prefix extension

      - name: Write Chrome signing key
        if: steps.gate.outputs.exists == 'false'
        env:
          CHROME_SIGNING_KEY: ${{ secrets.CHROME_SIGNING_KEY }}
        run: |
          if ! printf '%s' "$CHROME_SIGNING_KEY" | base64 -d > extension/chrome-key.pem 2>/dev/null; then
            echo "::error::CHROME_SIGNING_KEY is not valid base64. Re-set it with: base64 -w0 chrome-key.pem | gh secret set CHROME_SIGNING_KEY"
            exit 1
          fi
          if ! grep -q "BEGIN PRIVATE KEY" extension/chrome-key.pem; then
            echo "::error::CHROME_SIGNING_KEY decoded but is not a PEM private key."
            exit 1
          fi

      - name: Package Firefox (signed XPI + updates.json)
        if: steps.gate.outputs.exists == 'false'
        working-directory: extension
        env:
          AISCAN_BUILD_ENV: prod
          AISCAN_VERSION: ${{ steps.ver.outputs.version }}
          AISCAN_RELEASE_BASE_URL: https://github.com/sleuth-io/aiscan-clients/releases/download/${{ github.ref_name }}/
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: npm run package:firefox

      - name: Package Chrome (CRX + update_manifest.xml)
        if: steps.gate.outputs.exists == 'false'
        working-directory: extension
        env:
          AISCAN_BUILD_ENV: prod
          AISCAN_VERSION: ${{ steps.ver.outputs.version }}
          AISCAN_RELEASE_BASE_URL: https://github.com/sleuth-io/aiscan-clients/releases/download/${{ github.ref_name }}/
          # Optional guard: if set, the pack fails when the signing key yields a different extension
          # id (a wrong CHROME_SIGNING_KEY would silently break auto-update for managed browsers).
          AISCAN_EXPECTED_APP_ID: ${{ vars.CHROME_EXTENSION_ID }}
        run: npm run pack:chrome

      - name: Create GitHub Release
        if: steps.gate.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          make_latest: false
          files: |
            extension/dist/artifacts/aiscan.crx
            extension/dist/artifacts/aiscan.xpi

      - name: Assemble Pages site
        if: steps.gate.outputs.exists == 'false'
        run: |
          set -euo pipefail
          mkdir -p _site
          # Pin the Firefox install link to this release's tag. It cannot use
          # releases/latest/download: no release here is marked "latest" (several clients share the
          # repo), so that URL 404s or resolves to a desktop CLI release.
          XPI_URL="https://github.com/sleuth-io/aiscan-clients/releases/download/${GITHUB_REF_NAME}/aiscan.xpi"
          sed "s|__XPI_URL__|${XPI_URL}|g" extension/pages/index.html > _site/index.html
          if grep -q '__XPI_URL__' _site/index.html; then
            echo "::error::__XPI_URL__ placeholder survived substitution in the Pages index."
            exit 1
          fi
          cp extension/dist/artifacts/update_manifest.xml _site/
          cp extension/dist/artifacts/updates.json _site/

      - name: Upload Pages artifact
        if: steps.gate.outputs.exists == 'false'
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to Pages
        id: deploy
        if: steps.gate.outputs.exists == 'false'
        uses: actions/deploy-pages@v5
